<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BREM 기사 동일 리스트">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="noindex,nofollow">
  <title>BREM 기사 동일 리스트</title>
  <link rel="icon" href="assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css?v=20260622a">
  <link rel="stylesheet" href="css/data-loading.css?v=20260622f">
  <link rel="stylesheet" href="css/mobile-compact.css?v=20260623n">
  <link rel="stylesheet" href="css/mobile-ui.css?v=20260623ab">
</head>
<body class="drivers-page drivers-duplicates-page">
  <div class="app index-app">
    <div class="index-layout">
      <aside class="index-sidebar" id="indexSidebar" aria-label="기사 관리 메뉴">
        <div class="index-sidebar-head">
          <p class="index-sidebar-eyebrow">BREM ADMIN</p>
          <strong>기사등록 프로그램</strong>
          <div class="index-program-nav" role="navigation" aria-label="기사등록 메뉴">
            <a class="index-program-link" href="drivers.html">기사 목록</a>
            <a class="index-program-link" href="rider-manage.html?register=1">기사 등록</a>
            <a class="index-program-link active" href="drivers-duplicates.html" aria-current="page">동일 리스트</a>
          </div>
        </div>
        <div class="index-sidebar-foot">
          <a class="index-nav-link index-nav-link--secondary" href="admin.html">전체 관리자</a>
        </div>
      </aside>

      <div class="index-content">
        <header class="site-header drivers-header">
          <div class="drivers-header__row">
            <img
              class="site-header__logo"
              src="assets/brand/brem-logo-mark.png"
              width="120"
              height="86"
              alt="BREM PLUS DELIVERY AGENCY"
            >
            <div class="drivers-header__title">
              <p class="eyebrow">BREM 기사등록</p>
              <h1 id="duplicatesPageTitle">동일 리스트</h1>
            </div>
          </div>
          <div class="drivers-header__db">
            <span class="db-status db-status--pending" id="driverDbStatus" aria-live="polite">DB: 확인 중…</span>
          </div>
          <div class="drivers-header__actions">
            <span class="drivers-header__count">등록 <strong id="driverTotal">0명</strong></span>
            <a class="drivers-header__quick" href="drivers.html">기사 목록</a>
            <button type="button" class="drivers-header__menu" id="indexMenuBtn" aria-controls="indexSidebar">메뉴</button>
          </div>
        </header>

        <main class="layout layout--page">
          <section class="panel list-panel duplicates-panel" aria-labelledby="duplicatesTitle">
            <div class="panel-header list-header list-header--compact">
              <div>
                <h2 id="duplicatesTitle">동일 리스트</h2>
                <p class="panel-subtitle duplicates-panel__subtitle">쿠팡 ID · 이름 · 전화번호 · 배민 ID가 같은 기사를 묶어 표시합니다.</p>
              </div>
              <div class="filters filters--compact">
                <button type="button" class="btn ghost" id="refreshDuplicatesBtn">새로고침</button>
                <a class="btn ghost" href="drivers.html">기사 목록</a>
              </div>
            </div>

            <div class="brem-data-loading" id="bremDataLoading" hidden role="status" aria-live="polite">
              <span class="brem-data-loading__spinner" aria-hidden="true"></span>
              <span class="brem-data-loading__text">데이터 불러오는 중...</span>
            </div>

            <div class="duplicate-tabs" role="tablist" aria-label="동일 기준" id="duplicateTabs"></div>

            <p class="duplicate-summary" id="duplicateSummary" aria-live="polite"></p>

            <div class="duplicate-groups" id="duplicateGroups"></div>

            <div class="empty-state" id="duplicateEmptyState" hidden>표시할 중복 그룹이 없습니다.</div>
          </section>
        </main>
      </div>
    </div>

    <div class="index-overlay" id="indexOverlay" hidden></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/brem-env.js"></script>
  <script src="js/perf.js"></script>
  <script src="js/session-security.js?v=20260621e"></script>
  <script src="js/supabase-config.js?v=20260620c"></script>
  <script src="js/data-cache.js?v=20260621n"></script>
  <script src="js/data-loading-ui.js?v=20260622h"></script>
  <script src="js/storage-supabase-mapper.js"></script>
  <script src="js/storage-guard.js"></script>
  <script src="js/storage-supabase-adapter.js?v=20260622p"></script>
  <script src="js/driver-utils.js"></script>
  <script src="js/storage.js?v=20260622p"></script>
  <script src="js/db-connection-status.js?v=20260622f"></script>
  <script src="js/driver-program-access.js?v=20260620c"></script>
  <script src="js/index-nav.js"></script>
  <script src="js/driver-duplicates.js?v=20260623a"></script>
</body>
</html>
