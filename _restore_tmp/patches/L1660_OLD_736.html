  <title>BREM 관리자 대시보드</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <section class="login-page" id="adminLoginPage">
    <form class="login-card" id="adminLoginForm">
      <p class="login-eyebrow">BREM ADMIN</p>
      <h1>관리자 로그인</h1>
      <label>
        이름
        <input type="text" id="adminName" placeholder="관리자" autocomplete="username" required>
      </label>
      <label>
        비밀번호
        <input type="password" id="adminPassword" placeholder="비밀번호" autocomplete="current-password" required>
      </label>
      <button class="primary-btn" type="submit">로그인</button>
      <p class="login-help" id="adminLoginHelp">기본 계정: 관리자 / 1234 · 로그인 후 「관리자 계정」에서 계정·메뉴 권한 관리</p>
    </form>
  </section>
