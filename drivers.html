<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="BREM 기사 목록">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="noindex,nofollow">
  <title>BREM 기사 목록</title>
  <link rel="icon" href="assets/brand/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css?v=20260622a">
  <link rel="stylesheet" href="css/data-loading.css?v=20260622f">
  <link rel="stylesheet" href="css/mobile-compact.css?v=20260623n">
  <link rel="stylesheet" href="css/mobile-ui.css?v=20260623ab">
</head>
<body class="drivers-page">
  <div class="app index-app">
    <div class="index-layout">
      <aside class="index-sidebar" id="indexSidebar" aria-label="기사 관리 메뉴">
        <div class="index-sidebar-head">
          <p class="index-sidebar-eyebrow">BREM ADMIN</p>
          <strong>기사등록 프로그램</strong>
          <div class="index-program-nav" role="navigation" aria-label="기사등록 메뉴">
            <a class="index-program-link active" href="drivers.html" aria-current="page">기사 목록</a>
            <a class="index-program-link" href="rider-manage.html?register=1">기사 등록</a>
            <a class="index-program-link" href="drivers-duplicates.html">동일 리스트</a>
          </div>
        </div>
        <div class="index-sidebar-foot">
          <a class="index-nav-link index-nav-link--secondary" href="admin.html">전체 관리자</a>
        </div>
      </aside>

      <div class="index-content">
    <header class="site-header drivers-header">
      <div class="drivers-header__row">
        <img
          class="site-header__logo"
          src="assets/brand/brem-logo-mark.png"
          width="120"
          height="86"
          alt="BREM PLUS DELIVERY AGENCY"
        >
        <div class="drivers-header__title">
          <p class="eyebrow">BREM 기사등록</p>
          <h1 id="driversPageTitle">기사 목록</h1>
        </div>
      </div>
      <div class="drivers-header__db">
        <span class="db-status db-status--pending" id="driverDbStatus" aria-live="polite">DB: 확인 중…</span>
      </div>
      <div class="drivers-header__actions">
        <span class="drivers-header__count">등록 <strong id="driverTotal">0명</strong></span>
        <a class="drivers-header__quick" href="rider-manage.html?register=1">기사 등록</a>
        <button type="button" class="drivers-header__menu" id="indexMenuBtn" aria-controls="indexSidebar">메뉴</button>
      </div>
    </header>

    <main class="layout layout--page">
      <section class="panel list-panel list-panel--scrollable" aria-labelledby="listTitle">
        <h2 id="listTitle" class="sr-only">기사 목록</h2>
        <div class="panel-header list-header list-header--compact">
          <div class="list-header__tools">
            <label class="search-field">
              <span class="sr-only">이름 검색</span>
              <input type="search" id="searchInput" placeholder="이름·연락처·ID 검색">
            </label>
            <label class="filter-field">
              <span class="sr-only">상태 필터</span>
              <select id="statusFilter">
                <option value="전체">전체 상태</option>
                <option value="근무중">근무중</option>
                <option value="휴무">휴무</option>
                <option value="퇴사">퇴사</option>
              </select>
            </label>
          </div>
          <div class="filters filters--compact">
            <button type="button" class="btn ghost" id="refreshDriverListBtn">새로고침</button>
            <button type="button" class="btn ghost" id="exportExcelBtn">엑셀</button>
            <button type="button" class="btn ghost" id="mergeAutoBtn">자동병합</button>
            <button type="button" class="btn ghost danger-outline" id="deleteAllDriversBtn">전체삭제</button>
            <button type="button" class="btn ghost danger-outline" id="bulkDeleteBtn" disabled>선택삭제</button>
          </div>
        </div>

        <div class="brem-data-loading" id="bremDataLoading" hidden role="status" aria-live="polite">
          <span class="brem-data-loading__spinner" aria-hidden="true"></span>
          <span class="brem-data-loading__text">데이터 불러오는 중...</span>
        </div>

        <div class="list-selection-bar" id="listSelectionBar" hidden>
          <span id="selectedCountLabel">0명 선택</span>
          <button type="button" class="btn small ghost" id="mergeSelectedBtn" disabled>선택 병합</button>
          <button type="button" class="btn small delete" id="bulkDeleteBtnBar">선택 삭제</button>
        </div>

        <div class="driver-list-scroll" id="driverListScroll">
          <div class="table-wrap list-table-scroll">
            <table class="driver-table driver-table--compact" data-sort-table="driver-list">
              <thead>
                <tr>
                  <th class="col-select">
                    <label class="select-all-label">
                      <span class="sr-only">전체 선택</span>
                      <input type="checkbox" id="selectAllDrivers" aria-label="현재 목록 전체 선택">
                    </label>
                  </th>
                  <th class="col-name"><button type="button" class="th-sort-btn" data-sort-key="name" aria-sort="ascending"><span class="th-sort-label">이름</span><span class="th-sort-indicator">↑</span></button></th>
                  <th class="col-phone"><button type="button" class="th-sort-btn" data-sort-key="phone"><span class="th-sort-label">연락처</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-baemin"><button type="button" class="th-sort-btn" data-sort-key="baeminId"><span class="th-sort-label">배민 ID</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-coupang"><button type="button" class="th-sort-btn" data-sort-key="coupangId"><span class="th-sort-label">쿠팡 ID</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-platform"><button type="button" class="th-sort-btn" data-sort-key="platform"><span class="th-sort-label">플랫폼</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-event"><button type="button" class="th-sort-btn" data-sort-key="event"><span class="th-sort-label">이벤트</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-date"><button type="button" class="th-sort-btn" data-sort-key="joinDate"><span class="th-sort-label">가입일</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-status"><button type="button" class="th-sort-btn" data-sort-key="status"><span class="th-sort-label">상태</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-memo"><button type="button" class="th-sort-btn" data-sort-key="memo"><span class="th-sort-label">메모</span><span class="th-sort-indicator">↕</span></button></th>
                  <th class="col-privacy">민감</th>
                  <th class="col-actions">관리</th>
                </tr>
              </thead>
              <tbody id="driverTableBody"></tbody>
            </table>
          </div>

          <div class="mobile-list" id="mobileDriverList"></div>
        </div>

        <p class="list-scroll-note" id="driverListCount" aria-live="polite"></p>

        <div class="empty-state" id="emptyState">등록된 기사가 없습니다.</div>
      </section>
    </main>
      </div>
    </div>

    <div class="index-overlay" id="indexOverlay" hidden></div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/brem-env.js"></script>
  <script src="js/perf.js"></script>
  <script src="js/session-security.js?v=20260621e"></script>
  <script src="js/supabase-config.js?v=20260620c"></script>
  <script src="js/data-cache.js?v=20260621n"></script>
  <script src="js/data-loading-ui.js?v=20260622h"></script>
  <script src="js/storage-supabase-mapper.js"></script>
  <script src="js/storage-guard.js"></script>
  <script src="js/storage-supabase-adapter.js?v=20260703a"></script>
  <script src="js/driver-utils.js"></script>
  <script src="js/table-sort.js"></script>
  <script src="js/storage.js?v=20260703a"></script>
  <script src="js/db-connection-status.js?v=20260622f"></script>
  <script src="js/driver-program-access.js?v=20260620c"></script>
  <script src="js/index-nav.js"></script>
  <script src="js/driver-list.js?v=20260623c"></script>
</body>
</html>
