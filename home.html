<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BREM PLUS DELIVERY AGENCY">
  <title>BREM PLUS DELIVERY AGENCY</title>
  <link rel="stylesheet" href="css/brand.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--brem-text);
      background: var(--brem-black);
      font-family: var(--brem-sans);
    }

    .brem-home {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 20px 40px;
      background:
        radial-gradient(circle at 50% 18%, rgba(212, 175, 55, 0.12), transparent 42rem),
        radial-gradient(circle at 80% 90%, rgba(212, 175, 55, 0.06), transparent 28rem),
        var(--brem-black);
    }

    .brem-home-inner {
      width: min(560px, 100%);
      display: grid;
      gap: 34px;
      justify-items: center;
      text-align: center;
    }

    .brem-logo-wrap {
      width: min(100%, 480px);
    }

    .brem-logo-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .brem-portal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
    }

    .brem-home-note {
      margin: 0;
      color: var(--brem-text-muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    @media (max-width: 520px) {
      .brem-portal-grid {
        grid-template-columns: 1fr;
      }

      .brem-btn-portal {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="brem-home">
    <div class="brem-home-inner">
      <div class="brem-logo-wrap">
        <img src="assets/brand/brem-logo.png" alt="BREM PLUS DELIVERY AGENCY">
      </div>

      <div class="brem-portal-grid">
        <a class="brem-btn-portal" href="driver.html">
          <svg class="brem-btn-portal-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <path d="M12 42h34l4 8H8l4-8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="18" cy="50" r="4" stroke="currentColor" stroke-width="2"/>
            <circle cx="42" cy="50" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M18 34h16l6-10h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="46" cy="18" r="5" stroke="currentColor" stroke-width="2"/>
            <path d="M46 23v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="brem-btn-portal-label">기사앱</span>
        </a>

        <a class="brem-btn-portal" href="admin.html">
          <svg class="brem-btn-portal-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <path d="M32 8 48 14v14c0 11-7 20-16 24-9-4-16-13-16-24V14L32 8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="32" cy="28" r="6" stroke="currentColor" stroke-width="2"/>
            <path d="M24 40c2.5 3 5.2 4.5 8 4.5s5.5-1.5 8-4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="brem-btn-portal-label">관리자앱</span>
        </a>
      </div>

      <p class="brem-home-note">기사 등록·관리: <a href="index.html" style="color: var(--brem-gold);">기사등록 프로그램</a></p>
    </div>
  </main>
</body>
</html>
